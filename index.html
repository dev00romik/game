<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Document</title>
    <style>
        :root {
            --bg1: #1a0a14;
            --bg2: #0d0007;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, var(--bg1) 0%, var(--bg2) 80%, #050002 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            cursor: default;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle var(--dur) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.7);
            }
        }

        canvas {
            position: relative;
            z-index: 1;
            display: block;
        }

        .overlay-text {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: #ffb3d0;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-align: center;
            opacity: 0.7;
            animation: fadePulse 4s ease-in-out infinite;
            text-shadow: 0 0 12px #ff6b9d, 0 0 30px #c44dff;
            pointer-events: none;
        }

        @keyframes fadePulse {
            0%,
            100% {
                opacity: 0.45;
            }
            50% {
                opacity: 0.85;
            }
        }

        .small-note {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            opacity: 0.55;
            margin-top: 4px;
        }

        /* Кнопка зміни мови – менша й зручніша для пальців */
        .lang-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(255, 107, 157, 0.15);
            border: 1px solid #ff6b9d;
            color: #ffb3d0;
            font-family: 'Georgia', serif;
            font-size: 0.75rem;
            padding: 8px 14px;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
            letter-spacing: 0.04em;
            text-shadow: 0 0 8px #ff6b9d;
            box-shadow: 0 0 12px rgba(255, 107, 157, 0.2);
            min-height: 36px;
            min-width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lang-btn:hover {
            background: rgba(255, 107, 157, 0.3);
            border-color: #ff9ec5;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
            transform: scale(1.05);
        }

        .lang-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="loveCanvas"></canvas>
    <div class="stars-container" id="starsContainer"></div>

    <button class="lang-btn" id="langButton">🌐 Змінити мову</button>

    <div class="overlay-text">
        Вікторія
        <div class="small-note">Я тебе люблю💕</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('loveCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            let time = 0;

            // Серце параметричне
            function heartX(t) {
                return 16 * Math.pow(Math.sin(t), 3);
            }
            function heartY(t) {
                return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            }

            // Мови
            const languagePhrases = [
                { lang: "🇺🇦 Українська", phrase: "Я тебе люблю 💕" },
                { lang: "🇬🇧 English", phrase: "I love you 💕" },
                { lang: "🇪🇸 Español", phrase: "Te quiero 💕" },
                { lang: "🇫🇷 Français", phrase: "Je t'aime 💕" },
                { lang: "🇩🇪 Deutsch", phrase: "Ich liebe dich 💕" },
                { lang: "🇮🇹 Italiano", phrase: "Ti amo 💕" },
                { lang: "🇵🇱 Polski", phrase: "Kocham cię 💕" },
                { lang: "🇯🇵 日本語", phrase: "愛してる 💕" },
                { lang: "🇰🇷 한국어", phrase: "사랑해 💕" },
                { lang: "🇨🇳 中文", phrase: "我爱你 💕" },
                { lang: "🇹🇷 Türkçe", phrase: "Seni seviyorum 💕" },
                { lang: "🇵🇹 Português", phrase: "Eu te amo 💕" },
                { lang: "🇳🇱 Nederlands", phrase: "Ik hou van je 💕" },
                { lang: "🇸🇪 Svenska", phrase: "Jag älskar dig 💕" },
                { lang: "🇳🇴 Norsk", phrase: "Jeg elsker deg 💕" },
                { lang: "🇩🇰 Dansk", phrase: "Jeg elsker dig 💕" },
                { lang: "🇫🇮 Suomi", phrase: "Rakastan sinua 💕" },
                { lang: "🇭🇺 Magyar", phrase: "Szeretlek 💕" },
                { lang: "🇷🇴 Română", phrase: "Te iubesc 💕" },
                { lang: "🇨🇿 Čeština", phrase: "Miluji tě 💕" },
                { lang: "🇸🇰 Slovenčina", phrase: "Ľúbim ťa 💕" },
                { lang: "🇧🇬 Български", phrase: "Обичам те 💕" },
                { lang: "🇷🇸 Srpski", phrase: "Volim te 💕" },
                { lang: "🇭🇷 Hrvatski", phrase: "Volim te 💕" },
                { lang: "🇬🇷 Ελληνικά", phrase: "Σ' αγαπώ 💕" },
                { lang: "🇮🇱 עברית", phrase: "אני אוהב אותך 💕" },
                { lang: "🇸🇦 العربية", phrase: "أحبك 💕" },
                { lang: "🇮🇳 हिन्दी", phrase: "मैं तुमसे प्यार करता हूँ 💕" },
                { lang: "🇹🇭 ไทย", phrase: "ฉันรักคุณ 💕" },
                { lang: "🇻🇳 Tiếng Việt", phrase: "Anh yêu em 💕" },
                { lang: "🇮🇩 Indonesia", phrase: "Aku cinta kamu 💕" },
                { lang: "🇵🇭 Filipino", phrase: "Mahal kita 💕" },
                { lang: "🇲🇾 Melayu", phrase: "Saya cinta padamu 💕" },
                { lang: "🇪🇪 Eesti", phrase: "Ma armastan sind 💕" },
                { lang: "🇱🇻 Latviešu", phrase: "Es tevi mīlu 💕" },
                { lang: "🇱🇹 Lietuvių", phrase: "Aš tave myliu 💕" },
                { lang: "🇮🇸 Íslenska", phrase: "Ég elska þig 💕" }
            ];

            let currentLangIndex = 0;
            let phrases = [languagePhrases[currentLangIndex].phrase];

            // Кількість написів трохи зменшена для телефону
            const TOTAL_ITEMS = 42;
            // Масштаб серця буде вираховуватись динамічно
            let HEART_SCALE = 12;
            const SPEED = 0.04;
            let globalOffset = 0;

            function getHeartPosition(t) {
                const x = heartX(t) * HEART_SCALE;
                const y = heartY(t) * HEART_SCALE;
                return { x, y };
            }

            // Обчислюємо оптимальний масштаб серця, щоб вписувалося в екран
            function updateHeartScale() {
                // Ширина серця: 32 * scale, висота: ~30 * scale
                // Хочемо, щоб серце займало ~85% ширини або ~70% висоти (менше з того)
                const maxWidth = width * 0.9;
                const maxHeight = height * 0.7;
                const scaleByWidth = maxWidth / 32;
                const scaleByHeight = maxHeight / 30;
                HEART_SCALE = Math.min(scaleByWidth, scaleByHeight, 16); // обмеження, щоб не надто велике
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);

                const cx = width / 2;
                const cy = height / 2 - height * 0.05; // трохи вище центру

                // Ледь помітний силует серця
                ctx.save();
                ctx.globalAlpha = 0.07;
                ctx.strokeStyle = '#ff6b9d';
                ctx.lineWidth = 1.5;
                ctx.shadowColor = '#ff3b6f';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                for (let t = 0; t < Math.PI * 2; t += 0.02) {
                    const pos = getHeartPosition(t);
                    const px = cx + pos.x;
                    const py = cy - pos.y;
                    if (t === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();

                // Малюємо фрази горизонтально
                const fontSizeBase = Math.max(12, HEART_SCALE * 1.1); // шрифт залежить від розміру серця

                for (let i = 0; i < TOTAL_ITEMS; i++) {
                    const tNorm = (i / TOTAL_ITEMS + globalOffset) % 1.0;
                    const tAngle = tNorm * Math.PI * 2;

                    const pos = getHeartPosition(tAngle);
                    const x = cx + pos.x;
                    const y = cy - pos.y;

                    const phrase = phrases[i % phrases.length];

                    const pulse = 1 + Math.sin(time * 3 + i * 0.5) * 0.12;
                    const alpha = 0.7 + Math.sin(time * 2.5 + i) * 0.3;

                    ctx.save();
                    ctx.shadowColor = '#ff3b6f';
                    ctx.shadowBlur = 6 + Math.sin(time * 4 + i) * 2;
                    ctx.globalAlpha = alpha;

                    const gradient = ctx.createLinearGradient(x, y - 6, x, y + 6);
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.5, '#ffb3d0');
                    gradient.addColorStop(1, '#ff6b9d');
                    ctx.fillStyle = gradient;

                    ctx.font = `${fontSizeBase * pulse}px "Georgia", "Times New Roman", serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    ctx.fillText(phrase, x, y);

                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = alpha * 0.5;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(phrase, x, y);

                    ctx.restore();
                }
            }

            function createStars() {
                const container = document.getElementById('starsContainer');
                container.innerHTML = '';
                const count = 60; // трохи менше зірок
                for (let i = 0; i < count; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = 1 + Math.random() * 2;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.setProperty('--dur', (1.5 + Math.random() * 2.5) + 's');
                    star.style.animationDelay = Math.random() * 3 + 's';
                    container.appendChild(star);
                }
            }

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                updateHeartScale();
                createStars(); // перегенерувати зірки під новий розмір
            }

            function animate(timestamp) {
                time = timestamp * 0.001;
                globalOffset += SPEED * 0.012;
                if (globalOffset > 1) globalOffset -= 1;

                draw();
                requestAnimationFrame(animate);
            }

            function switchLanguage() {
                currentLangIndex = (currentLangIndex + 1) % languagePhrases.length;
                const selected = languagePhrases[currentLangIndex];
                phrases = [selected.phrase];
                document.querySelector('.lang-btn').textContent = `🌐 ${selected.lang}`;
            }

            // Ініціалізація
            document.getElementById('langButton').addEventListener('click', switchLanguage);
            document.querySelector('.lang-btn').textContent = `🌐 ${languagePhrases[0].lang}`;

            window.addEventListener('resize', resize);
            window.addEventListener('orientationchange', resize);
            // Плавна робота на iOS
            window.addEventListener('touchstart', () => {}, { passive: true });

            resize();
            createStars();
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
