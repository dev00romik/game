<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Вікторія 💕</title>
    <style>
        :root {
            --bg1: #1a0a14;
            --bg2: #0d0007;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-left: env(safe-area-inset-left, 10px);
            --safe-right: env(safe-area-inset-right, 10px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, var(--bg1) 0%, var(--bg2) 80%, #050002 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            cursor: default;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle var(--dur) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.7);
            }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        .overlay-text {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 10px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: #ffb3d0;
            font-size: 0.85rem;
            letter-spacing: 0.3em;
            text-align: center;
            opacity: 0.75;
            animation: fadePulse 4s ease-in-out infinite;
            text-shadow: 0 0 12px #ff6b9d, 0 0 30px #c44dff;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes fadePulse {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 0.9;
            }
        }

        .small-note {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            opacity: 0.6;
            margin-top: 2px;
        }

        /* Кнопка зміни мови */
        .lang-btn {
            position: fixed;
            top: calc(var(--safe-top) + 8px);
            right: calc(var(--safe-right) + 8px);
            z-index: 10;
            background: rgba(255, 107, 157, 0.18);
            border: 1px solid #ff6b9d;
            color: #ffb3d0;
            font-family: 'Georgia', serif;
            font-size: 0.75rem;
            padding: 8px 14px;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
            letter-spacing: 0.04em;
            text-shadow: 0 0 8px #ff6b9d;
            box-shadow: 0 0 12px rgba(255, 107, 157, 0.15);
            min-height: 36px;
            min-width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .lang-btn:active {
            background: rgba(255, 107, 157, 0.35);
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <canvas id="loveCanvas"></canvas>
    <div class="stars-container" id="starsContainer"></div>

    <button class="lang-btn" id="langButton">🌐 Змінити мову</button>

    <div class="overlay-text">
        Вікторія
        <div class="small-note">Я тебе люблю💕</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('loveCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            let time = 0;

            // Серце параметричне
            function heartX(t) {
                return 16 * Math.pow(Math.sin(t), 3);
            }
            function heartY(t) {
                return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            }

            // Мови
            const languagePhrases = [
                { lang: "🇺🇦 Українська", phrase: "Я тебе люблю 💕" },
                { lang: "🇬🇧 English", phrase: "I love you 💕" },
                { lang: "🇪🇸 Español", phrase: "Te quiero 💕" },
                { lang: "🇫🇷 Français", phrase: "Je t'aime 💕" },
                { lang: "🇩🇪 Deutsch", phrase: "Ich liebe dich 💕" },
                { lang: "🇮🇹 Italiano", phrase: "Ti amo 💕" },
                { lang: "🇵🇱 Polski", phrase: "Kocham cię 💕" },
                { lang: "🇯🇵 日本語", phrase: "愛してる 💕" },
                { lang: "🇰🇷 한국어", phrase: "사랑해 💕" },
                { lang: "🇨🇳 中文", phrase: "我爱你 💕" },
                { lang: "🇹🇷 Türkçe", phrase: "Seni seviyorum 💕" },
                { lang: "🇵🇹 Português", phrase: "Eu te amo 💕" },
                { lang: "🇳🇱 Nederlands", phrase: "Ik hou van je 💕" },
                { lang: "🇸🇪 Svenska", phrase: "Jag älskar dig 💕" },
                { lang: "🇳🇴 Norsk", phrase: "Jeg elsker deg 💕" },
                { lang: "🇩🇰 Dansk", phrase: "Jeg elsker dig 💕" },
                { lang: "🇫🇮 Suomi", phrase: "Rakastan sinua 💕" },
                { lang: "🇭🇺 Magyar", phrase: "Szeretlek 💕" },
                { lang: "🇷🇴 Română", phrase: "Te iubesc 💕" },
                { lang: "🇨🇿 Čeština", phrase: "Miluji tě 💕" },
                { lang: "🇸🇰 Slovenčina", phrase: "Ľúbim ťa 💕" },
                { lang: "🇧🇬 Български", phrase: "Обичам те 💕" },
                { lang: "🇷🇸 Srpski", phrase: "Volim te 💕" },
                { lang: "🇭🇷 Hrvatski", phrase: "Volim te 💕" },
                { lang: "🇬🇷 Ελληνικά", phrase: "Σ' αγαπώ 💕" },
                { lang: "🇮🇱 עברית", phrase: "אני אוהב אותך 💕" },
                { lang: "🇸🇦 العربية", phrase: "أحبك 💕" },
                { lang: "🇮🇳 हिन्दी", phrase: "मैं तुमसे प्यार करता हूँ 💕" },
                { lang: "🇹🇭 ไทย", phrase: "ฉันรักคุณ 💕" },
                { lang: "🇻🇳 Tiếng Việt", phrase: "Anh yêu em 💕" },
                { lang: "🇮🇩 Indonesia", phrase: "Aku cinta kamu 💕" },
                { lang: "🇵🇭 Filipino", phrase: "Mahal kita 💕" },
                { lang: "🇲🇾 Melayu", phrase: "Saya cinta padamu 💕" },
                { lang: "🇪🇪 Eesti", phrase: "Ma armastan sind 💕" },
                { lang: "🇱🇻 Latviešu", phrase: "Es tevi mīlu 💕" },
                { lang: "🇱🇹 Lietuvių", phrase: "Aš tave myliu 💕" },
                { lang: "🇮🇸 Íslenska", phrase: "Ég elska þig 💕" }
            ];

            let currentLangIndex = 0;
            let phrases = [languagePhrases[currentLangIndex].phrase];

            // Динамічне обчислення кількості написів і масштабу
            let TOTAL_ITEMS = 47;
            let HEART_SCALE = 8;
            const SPEED = 0.10;
            let globalOffset = 0;

            function getHeartPosition(t) {
                const x = heartX(t) * HEART_SCALE;
                const y = heartY(t) * HEART_SCALE;
                return { x, y };
            }

            // Розумне масштабування під будь-який екран
            function updateHeartScale() {
                // Беремо безпечні відступи: зверху треба залишити місце для кнопки (≈50px) та статус-бару,
                // знизу – підпис (≈60px), з боків – невеликі відступи.
                const topMargin = 60 + (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--safe-top')) || 20);
                const bottomMargin = 70 + (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom')) || 20);
                const sideMargin = 20;

                const availableWidth = width - sideMargin * 2;
                const availableHeight = height - topMargin - bottomMargin;

                // Ширина серця: ~32 * HEART_SCALE, висота: ~30 * HEART_SCALE
                const scaleByWidth = availableWidth / 32;
                const scaleByHeight = availableHeight / 30;

                HEART_SCALE = Math.min(scaleByWidth, scaleByHeight, 14); // максимум 14 для гарного вигляду
                if (HEART_SCALE < 7) HEART_SCALE = 7; // мінімальне значення

                // Кількість написів пропорційна довжині контуру (приблизно 100 * HEART_SCALE) 
                // Встановлюємо так, щоб текст не налітав один на одного.
                const baseItems = 28;
                const scaleFactor = HEART_SCALE / 10; // 10 - базовий масштаб
                TOTAL_ITEMS = Math.floor(baseItems * scaleFactor);
                if (TOTAL_ITEMS < 24) TOTAL_ITEMS = 24;
                if (TOTAL_ITEMS > 48) TOTAL_ITEMS = 48;
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);

                // Центр серця: по горизонталі центр, по вертикалі трохи вище середини вільної області
                const topMargin = 60 + (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--safe-top')) || 20);
                const bottomMargin = 70 + (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom')) || 20);
                const availableHeight = height - topMargin - bottomMargin;
                const cx = width / 2;
                const cy = topMargin + availableHeight / 2 - 10; // -10 для візуального балансу

                // Легкий силует серця
                ctx.save();
                ctx.globalAlpha = 0.06;
                ctx.strokeStyle = '#ff6b9d';
                ctx.lineWidth = 1.5;
                ctx.shadowColor = '#ff3b6f';
                ctx.shadowBlur = 18;
                ctx.beginPath();
                for (let t = 0; t < Math.PI * 2; t += 0.02) {
                    const pos = getHeartPosition(t);
                    const px = cx + pos.x;
                    const py = cy - pos.y;
                    if (t === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();

                // Розмір шрифту залежить від масштабу
                const fontSizeBase = Math.max(11, HEART_SCALE * 0.95);

                for (let i = 0; i < TOTAL_ITEMS; i++) {
                    const tNorm = (i / TOTAL_ITEMS + globalOffset) % 1.0;
                    const tAngle = tNorm * Math.PI * 2;

                    const pos = getHeartPosition(tAngle);
                    const x = cx + pos.x;
                    const y = cy - pos.y;

                    const phrase = phrases[i % phrases.length];

                    const pulse = 1 + Math.sin(time * 3 + i * 0.5) * 0.12;
                    const alpha = 0.75 + Math.sin(time * 2.5 + i) * 0.25;

                    ctx.save();
                    ctx.shadowColor = '#ff3b6f';
                    ctx.shadowBlur = 5 + Math.sin(time * 4 + i) * 2;
                    ctx.globalAlpha = alpha;

                    const gradient = ctx.createLinearGradient(x, y - 5, x, y + 5);
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.5, '#ffb3d0');
                    gradient.addColorStop(1, '#ff6b9d');
                    ctx.fillStyle = gradient;

                    ctx.font = `${fontSizeBase * pulse}px "Georgia", "Times New Roman", serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    ctx.fillText(phrase, x, y);

                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = alpha * 0.5;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(phrase, x, y);

                    ctx.restore();
                }
            }

            function createStars() {
                const container = document.getElementById('starsContainer');
                container.innerHTML = '';
                const count = 55;
                for (let i = 0; i < count; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = 0.8 + Math.random() * 2;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.setProperty('--dur', (1.5 + Math.random() * 2.5) + 's');
                    star.style.animationDelay = Math.random() * 3 + 's';
                    container.appendChild(star);
                }
            }

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                updateHeartScale();
                createStars();
            }

            function animate(timestamp) {
                time = timestamp * 0.001;
                globalOffset += SPEED * 0.012;
                if (globalOffset > 1) globalOffset -= 1;

                draw();
                requestAnimationFrame(animate);
            }

            function switchLanguage() {
                currentLangIndex = (currentLangIndex + 1) % languagePhrases.length;
                const selected = languagePhrases[currentLangIndex];
                phrases = [selected.phrase];
                document.querySelector('.lang-btn').textContent = `🌐 ${selected.lang}`;
            }

            document.getElementById('langButton').addEventListener('click', switchLanguage);
            document.querySelector('.lang-btn').textContent = `🌐 ${languagePhrases[0].lang}`;

            window.addEventListener('resize', resize);
            window.addEventListener('orientationchange', () => {
                setTimeout(resize, 50);
            });
            window.addEventListener('touchstart', () => {}, { passive: true });

            resize();
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
